<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilibili Hardcore</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <a class="nav-brand" href="/">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span>Bilibili Hardcore</span>
    </a>
    <div class="nav-steps" id="stepIndicator">
      <div class="nav-step active" data-step="0" onclick="goToStep(0)"></div>
      <div class="nav-step" data-step="1" onclick="goToStep(1)"></div>
      <div class="nav-step" data-step="2" onclick="goToStep(2)"></div>
      <div class="nav-step" data-step="3" onclick="goToStep(3)"></div>
      <div class="nav-step" data-step="4" onclick="goToStep(4)"></div>
    </div>
  </nav>

  <div class="container">
    <!-- Page Hero -->
    <div class="page-hero">
      <h1>B 站硬核会员答题</h1>
      <p>AI 驱动的自动答题工具</p>
    </div>

    <!-- Step 0: Model Config -->
    <div class="step active" id="step0">
      <div class="section-head">
        <h2>选择 AI 模型</h2>
      </div>
      <div class="toast toast-error" id="toast0"></div>
      <div class="form-group">
        <label>模型提供商</label>
        <select id="provider" onchange="onProviderChange()">
          <option value="deepseek">DeepSeek (推荐)</option>
          <option value="gemini">Gemini</option>
          <option value="openai">OpenAI 兼容 API</option>
        </select>
      </div>
      <div class="form-group" id="baseUrlGroup" style="display:none;">
        <label>API Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.deepseek.com/v1" autocomplete="off">
      </div>
      <div class="form-group" id="modelSelectGroup" style="display:none;">
        <label>模型名称</label>
        <select id="modelSelect">
          <option value="deepseek-v4-flash">deepseek-v4-flash</option>
          <option value="deepseek-v4-pro">deepseek-v4-pro</option>
        </select>
      </div>
      <div class="form-group" id="modelGroup" style="display:none;">
        <label>模型名称</label>
        <input type="text" id="modelName" placeholder="gemini-2.5-flash" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="text" id="apiKey" placeholder="输入你的 API Key" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" style="-webkit-text-security:disc;">
      </div>
      <p class="muted mb-16">本工具仅在本地调用 API，不会上传你的登录信息和 API Key。</p>
      <button class="btn btn-black btn-block" onclick="saveConfig()">下一步 - 登录</button>
    </div>

    <!-- Step 1: QR Login -->
    <div class="step" id="step1">
      <div class="section-head">
        <h2>登录 B 站</h2>
        <div class="section-head-actions">
          <span class="link" onclick="goBack(0)">返回上一步</span>
        </div>
      </div>
      <div class="toast toast-error" id="toast1"></div>
      <div id="loggedInView" style="display:none;">
        <div class="text-center" style="padding:32px 0;">
          <p class="logged-status">已登录</p>
          <p class="logged-user" id="loggedUserInfo"></p>
          <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn btn-black" onclick="enterOrResume()">继续答题</button>
            <button class="btn btn-white" onclick="reLogin()">重新扫码登录</button>
          </div>
        </div>
      </div>
      <div id="qrView">
        <div class="qr-area" id="qrArea">
          <div class="spinner"></div> 正在获取二维码...
        </div>
        <div class="text-center mt-16">
          <button class="btn btn-gray" onclick="refreshQR()" id="refreshBtn" style="display:none;">刷新二维码</button>
        </div>
      </div>
      <div class="log-area" id="loginLog"></div>
    </div>

    <!-- Step 2: Category & Captcha -->
    <div class="step" id="step2">
      <div class="section-head">
        <h2>选择答题分类</h2>
        <div class="section-head-actions">
          <span class="link" onclick="goBack(0)">修改配置</span>
          <span class="link" onclick="logout()">退出登录</span>
        </div>
      </div>
      <div class="toast toast-error" id="toast2"></div>
      <p class="muted mb-16">最多可选择 3 个分类</p>
      <div class="category-list" id="categoryList"></div>
      <div class="captcha-area" id="captchaArea" style="display:none;">
        <label>请输入验证码</label>
        <p class="muted mb-16">请查看下方验证码图片，多刷新几次后再填写</p>
        <img id="captchaImg" src="" alt="验证码" onclick="this.src=this.src.split('?')[0]+'?t='+Date.now()" title="点击刷新验证码">
        <div class="form-group mt-16">
          <input type="text" id="captchaInput" placeholder="输入验证码" autocomplete="off">
        </div>
      </div>
      <button class="btn btn-black btn-block" id="startQuizBtn" onclick="submitCaptcha()" disabled>开始答题</button>
    </div>

    <!-- Step 3: Quiz -->
    <div class="step" id="step3">
      <div class="section-head">
        <h2 id="quizTitle">准备答题</h2>
        <div class="section-head-actions">
          <span id="quizStatus" class="muted"></span>
          <span class="link" onclick="goBack(2)">返回选分类</span>
        </div>
      </div>
      <div id="quizReady" class="text-center" style="padding:48px 0;">
        <p style="font-size:18px;color:var(--mid-gray);margin-bottom:24px;">已就绪，点击下方按钮开始答题</p>
        <button class="btn btn-black" onclick="beginQuiz()" style="padding:12px 48px;font-size:18px;">开始答题</button>
      </div>
      <div id="quizRunning" style="display:none;">
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
        <div class="stats" id="quizStats">
          <div class="stat-item"><div class="num" id="statTotal">0</div><div class="label">已答</div></div>
          <div class="stat-item"><div class="num" id="statCorrect">0</div><div class="label">正确</div></div>
          <div class="stat-item"><div class="num" id="statAccuracy">0%</div><div class="label">正确率</div></div>
        </div>
        <div class="quiz-area" id="quizArea"></div>
        <div class="log-area" id="quizLog"></div>
      </div>
    </div>

    <!-- Step 4: Result -->
    <div class="step" id="step4">
      <div class="result-card">
        <div class="score" id="finalScore">0</div>
        <div class="msg" id="finalMsg">答题结束</div>
      </div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="text-center mt-24">
        <button class="btn btn-black" onclick="goBack(2)" style="margin-right:8px;">重新选分类</button>
        <button class="btn btn-white" onclick="logout()">重新配置</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
